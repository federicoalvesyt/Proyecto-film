<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetFilm TV</title>

<style>

body{
margin:0;
font-family:Arial;
background:#141414;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
font-size:28px;
font-weight:bold;
}

.logo span{color:#e50914;}

.top-btn{
background:#16c60c;
color:white;
border:none;
padding:8px 15px;
border-radius:4px;
cursor:pointer;
}

/* HERO */

.hero{
height:300px;
background:linear-gradient(to top,black,transparent),
url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba");
background-size:cover;
display:flex;
align-items:flex-end;
padding:40px;
font-size:40px;
font-weight:bold;
}

/* BUSCADOR */

.search{
text-align:center;
margin-top:20px;
}

.search input{
padding:10px;
width:250px;
border:none;
border-radius:4px;
}

/* AGREGAR */

.add-section{
text-align:center;
padding:30px;
}

.add-section input{
padding:8px;
margin:5px;
border:none;
border-radius:4px;
}

/* BOTONES */

button{
padding:8px 12px;
border:none;
border-radius:4px;
cursor:pointer;
font-weight:bold;
margin:5px;
}

.play-btn{
background:white;
color:black;
}

.delete-btn{
background:#e50914;
color:white;
}

/* CATALOGO */

.catalog{
display:flex;
flex-wrap:wrap;
gap:20px;
padding:30px;
justify-content:center;
}

.movie-card{
width:180px;
background:#222;
border-radius:6px;
overflow:hidden;
transition:0.3s;
}

.movie-card:hover{
transform:scale(1.05);
}

.movie-card img{
width:100%;
height:250px;
object-fit:cover;
}

.movie-info{
padding:10px;
text-align:center;
}

/* REPRODUCTOR */

#playerModal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
flex-direction:column;
}

#playerContainer{
width:90%;
height:70%;
}

iframe{
width:100%;
height:100%;
border:none;
}

/* DNS */

#dnsModal{
display:none;
position:fixed;
inset:0;
background:black;
}

#dnsModal iframe{
width:100%;
height:100%;
border:none;
}

.close-dns{
position:absolute;
top:20px;
right:20px;
background:#e50914;
color:white;
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
font-size:12px;
color:#aaa;
}

</style>
</head>

<body>

<header>

<div class="logo"><span>NET</span>FILM TV</div>

<button class="top-btn" onclick="openDNS()">Modo Protección</button>

</header>

<div class="hero">
Películas y Anime Gratis
</div>

<div class="search">
<input type="text" id="searchInput" placeholder="Buscar..." onkeyup="searchMovie()">
</div>

<div class="add-section">

<h2>Agregar Película</h2>

<input type="text" id="title" placeholder="Título">
<input type="file" id="imageFile">
<input type="text" id="link" placeholder="Link del video">

<br>

<button class="play-btn" onclick="addMovie()">Agregar</button>

</div>

<h2 style="text-align:center;">Películas</h2>

<div class="catalog" id="catalog"></div>

<h2 style="text-align:center;">Anime</h2>

<div class="catalog">

<div class="movie-card">
<img src="https://upload.wikimedia.org/wikipedia/en/9/94/NarutoCoverTankobon1.jpg">
<div class="movie-info">
<h4>Naruto</h4>
<button class="play-btn" onclick="watchMovie('https://www.youtube.com/embed/-G9BqkgZXRA')">Ver</button>
</div>
</div>

<div class="movie-card">
<img src="https://upload.wikimedia.org/wikipedia/en/2/2c/OnePieceVolume1Cover.jpg">
<div class="movie-info">
<h4>One Piece</h4>
<button class="play-btn" onclick="watchMovie('https://www.youtube.com/embed/S8_YwFLCh4U')">Ver</button>
</div>
</div>

<div class="movie-card">
<img src="https://upload.wikimedia.org/wikipedia/en/6/6f/Attack_on_Titan_manga_volume_1.jpg">
<div class="movie-info">
<h4>Attack on Titan</h4>
<button class="play-btn" onclick="watchMovie('https://www.youtube.com/embed/MGRm4IzK1SQ')">Ver</button>
</div>
</div>

</div>

<div id="playerModal">

<div id="playerContainer">

<iframe id="videoFrame" allowfullscreen></iframe>

</div>

<br>

<button class="play-btn" onclick="closePlayer()">Cerrar</button>

</div>

<div id="dnsModal">

<iframe src="https://adguard-dns.io/es/public-dns.html"></iframe>

<button class="close-dns" onclick="closeDNS()">Cerrar</button>

</div>

<footer>
NetFilm TV no aloja ni distribuye contenido audiovisual.
</footer>

<script>

let movies=[];

window.onload=function(){

const stored=localStorage.getItem("netfilm_movies");

if(stored){

movies=JSON.parse(stored);

renderMovies();

}

}

function addMovie(){

const title=document.getElementById("title").value;

const file=document.getElementById("imageFile").files[0];

let link=document.getElementById("link").value;

if(!title||!file||!link){

alert("Completa los campos");

return;

}

if(link.includes("youtube.com/watch?v=")){

link="https://www.youtube.com/embed/"+link.split("v=")[1];

}

const reader=new FileReader();

reader.onload=function(e){

movies.push({

title:title,

image:e.target.result,

link:link

});

localStorage.setItem("netfilm_movies",JSON.stringify(movies));

renderMovies();

}

reader.readAsDataURL(file);

}

function renderMovies(){

const catalog=document.getElementById("catalog");

catalog.innerHTML="";

movies.forEach((movie,index)=>{

catalog.innerHTML+=`

<div class="movie-card">

<img src="${movie.image}">

<div class="movie-info">

<h4>${movie.title}</h4>

<button class="play-btn" onclick="watchMovie('${movie.link}')">Ver</button>

<button class="delete-btn" onclick="deleteMovie(${index})">Borrar</button>

</div>

</div>

`;

});

}

function deleteMovie(index){

movies.splice(index,1);

localStorage.setItem("netfilm_movies",JSON.stringify(movies));

renderMovies();

}

function watchMovie(link){

document.getElementById("videoFrame").src=link;

document.getElementById("playerModal").style.display="flex";

}

function closePlayer(){

document.getElementById("playerModal").style.display="none";

document.getElementById("videoFrame").src="";

}

function openDNS(){

document.getElementById("dnsModal").style.display="block";

}

function closeDNS(){

document.getElementById("dnsModal").style.display="none";

}

function searchMovie(){

const input=document.getElementById("searchInput").value.toLowerCase();

const cards=document.querySelectorAll(".movie-card");

cards.forEach(card=>{

const title=card.innerText.toLowerCase();

card.style.display=title.includes(input)?"block":"none";

});

}

</script>

</body>
</html>
